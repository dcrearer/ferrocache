# OpenTelemetry Collector config for the FerroCache unified stack.
#
# Receives OTLP from FerroCache and forwards it to the Elastic APM Server, which
# performs APM-native routing into Elasticsearch (traces-apm-*, logs-apm-*,
# metrics-apm-*) so Kibana's APM UI works out of the box.
#
#   FerroCache --OTLP--> Collector --OTLP--> APM Server --> Elasticsearch --> Kibana

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  # Forward all signals to the APM Server's OTLP/gRPC intake on :8200.
  otlp/apm:
    endpoint: apm-server:8200
    tls:
      insecure: true   # local dev — APM Server intake is plain HTTP/2

  # Mirror to the collector's stdout for quick "is data flowing?" debugging.
  # Drop this once verified.
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/apm, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/apm, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/apm, debug]
